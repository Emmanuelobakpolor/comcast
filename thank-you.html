<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xfinity — Submitted</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f9fafb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 10% 90%, rgba(97,0,165,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 10%, rgba(97,0,165,0.05) 0%, transparent 60%);
            z-index: 0;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(97,0,165,0.08), 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid rgba(97,0,165,0.06);
            position: relative;
            overflow: hidden;
            z-index: 1;
            animation: fadeUp 0.55s cubic-bezier(0.4,0,0.2,1) both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6100a5 0%, #a855f7 100%);
            border-radius: 20px 20px 0 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: #111827;
            margin-bottom: 1.75rem;
        }

        .logo span { color: #6100a5; }

        .icon-wrap {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6100a5 0%, #a855f7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 4px 20px rgba(97,0,165,0.3);
        }

        .icon-wrap svg {
            width: 30px;
            height: 30px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.6rem;
            letter-spacing: -0.015em;
        }

        p {
            font-size: 0.9375rem;
            color: #6b7280;
            line-height: 1.65;
        }
    </style>
</head>
<body>
    <div class="page-bg"></div>

    <div class="card">
        <div class="logo">x<span>f</span>inity</div>

        <div class="icon-wrap">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1>Thanks for submitting!</h1>
        <p>Your form has been accepted.<br>We'll be in touch with you shortly.</p>
    </div>
</body>
</html>
